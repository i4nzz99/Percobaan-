<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Jump Game</title>
    <style>
        /* Mengatur tampilan dasar layar penuh */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none; /* Mencegah zoom otomatis di HP */
        }
        body {
            background-color: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* Container game yang fleksibel dan beradaptasi dengan layar HP */
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 450px;
            max-height: 850px;
            background: #000000;
            overflow: hidden;
        }

        @media (min-width: 451px) {
            #game-container {
                border-radius: 16px;
                height: 90vh;
                width: calc(90vh * (9/16));
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            }
        }

        /* Canvas diposisikan secara mutlak di lapisan paling bawah */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 1;
        }

        /* Desain UI Screen (Menu Mulai & Game Over) di lapisan atas */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            background: rgba(15, 23, 42, 0.95);
            z-index: 10;
            text-align: center;
            padding: 24px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 12px;
            color: #fbbf24;
            text-shadow: 0 0 10px rgba(251, 191, 36, 0.6);
            letter-spacing: 2px;
        }

        p {
            font-size: 1rem;
            margin-bottom: 24px;
            color: #94a3b8;
            line-height: 1.5;
        }

        .score-info {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        .score-highlight {
            color: #fbbf24;
            font-weight: bold;
        }

        button {
            padding: 14px 36px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #0f172a;
            background-color: #fbbf24;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(251, 191, 36, 0.4);
            z-index: 15; /* Memastikan tombol berada di posisi paling atas */
        }

        button:active {
            transform: scale(0.95);
            background-color: #f59e0b;
        }

        /* Skor waktu bermain */
        #score-board {
            position: absolute;
            top: 30px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffffff;
            z-index: 5;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8);
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Skor Aktif -->
        <div id="score-board" class="hidden">0</div>

        <!-- Layar Mulai -->
        <div id="start-screen" class="screen">
            <h1>NEON JUMP</h1>
            <p>Ketuk layar untuk melompat dan menghindari rintangan gerbang neon.</p>
            <div class="score-info">Skor Terbaik: <span id="start-high-score" class="score-highlight">0</span></div>
            <button id="start-btn">MULAI GAME</button>
        </div>

        <!-- Layar Game Over -->
        <div id="gameover-screen" class="screen hidden">
            <h1>GAME OVER</h1>
            <div class="score-info">
                Skor Anda: <span id="final-score" class="score-highlight">0</span><br>
                Skor Terbaik: <span id="high-score" class="score-highlight">0</span>
            </div>
            <button id="restart-btn">MAIN LAGI</button>
        </div>

        <!-- Canvas Game -->
        <canvas id="gameCanvas" width="400" height="700"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameContainer = document.getElementById('game-container');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');

        // Status Game
        let gameState = 'START'; // START, PLAYING, GAMEOVER
        let score = 0;
        let highScore = 0;
        let frames = 0;
        let shakeFrames = 0;

        // Penanganan penyimpanan lokal yang aman (mencegah crash pada mode samaran/WebView ketat)
        try {
            highScore = localStorage.getItem('neonJumpHighScore') || 0;
        } catch (e) {
            console.warn("Penyimpanan lokal tidak dapat diakses.");
        }

        // Sound Synthesizer dengan perlindungan penuh dari error
        let audioCtx = null;

        function initAudio() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx && audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            } catch (e) {
                console.warn("Web Audio tidak didukung atau diblokir oleh browser.");
            }
        }

        function playSound(type) {
            try {
                initAudio();
                if (!audioCtx) return;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'jump') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(350, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.12);
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.12);
                } else if (type === 'score') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(550, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(750, audioCtx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                } else if (type === 'crash') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.35);
                    gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.35);
                }
            } catch (e) {
                // Mencegah crash jika audio dinonaktifkan sistem
            }
        }

        // Konstruktor Partikel untuk Efek Visual
        const particles = [];
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 4 + 2;
                this.speedX = (Math.random() - 0.7) * 3;
                this.speedY = (Math.random() - 0.5) * 3;
                this.color = color || `rgba(251, 191, 36, ${Math.random() * 0.5 + 0.5})`;
                this.life = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= 0.025;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function spawnBurst(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        // Objek Karakter
        const bird = {
            x: 100,
            y: 350,
            size: 24,
            velocity: 0,
            gravity: 0.38,
            jumpStrength: -6.8,
            rotation: 0,
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                this.rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 7, this.velocity * 0.08));
                ctx.rotate(this.rotation);

                ctx.shadowBlur = 12;
                ctx.shadowColor = '#fbbf24';
                ctx.fillStyle = '#fbbf24';
                ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);

                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000000';
                ctx.fillRect(this.size/4 - 2, -this.size/3, 4, 6);

                ctx.restore();
            },
            update() {
                if (gameState === 'PLAYING') {
                    this.velocity += this.gravity;
                    this.y += this.velocity;

                    if (this.y - this.size/2 < 0) {
                        this.y = this.size/2;
                        this.velocity = 0;
                    }

                    if (this.y + this.size/2 > canvas.height - 40) {
                        triggerGameOver();
                    }

                    if (frames % 2 === 0) {
                        particles.push(new Particle(this.x - this.size/2, this.y, 'rgba(251, 191, 36, 0.4)'));
                    }
                }
            },
            jump() {
                if (gameState === 'PLAYING') {
                    this.velocity = this.jumpStrength;
                    playSound('jump');
                    spawnBurst(this.x - 10, this.y, 'rgba(251, 191, 36, 0.7)', 5);
                }
            }
        };

        const pipeGap = 160;

            const maxHeight = canvas.height - 40 - pipeGap - minHeight;
            const topHeight = Math.floor(Math.random() * (maxHeight - minHeight + 1) + minHeight);
